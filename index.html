<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#12181F" />
    <!-- Set the theme before first paint so light-mode users don't flash dark.
         Keep the storage key + resolution in sync with src/lib/theme.ts. -->
    <script>
      try {
        var t = localStorage.getItem('lgh-theme');
        if (!t || t === 'system')
          t = matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark';
        document.documentElement.dataset.theme = t;
      } catch (e) {}
    </script>
    <title>Le Grand Horaire — AI for Good 2026 (unofficial planner)</title>
    <meta
      name="description"
      content="Unofficial time-grid / conflict view for the AI for Good Global Summit 2026 (Geneva, 7–10 July). Not affiliated with ITU."
    />
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
