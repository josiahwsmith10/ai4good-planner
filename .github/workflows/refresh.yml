name: Refresh data

# The lightest thing that keeps the snapshot current without babysitting: scrape the
# programme every 2 hours through summit week (schedule self-retires 2026-07-12), and IF
# it changed, open/update one rolling PR. Small, safe diffs auto-merge; anything unusual
# waits for a human. A failed scrape never overwrites good data.
#
# One-time setup for this to run end-to-end:
#   1. Settings → Actions → General → Workflow permissions:
#        enable "Allow GitHub Actions to create and approve pull requests"
#   2. Settings → General: enable "Allow auto-merge"
#   3. Branch protection on main requiring the "checks" job (from deploy.yml) — this is
#      the gate that makes auto-merge wait for typecheck/lint/format/tests to pass.
#   4. A fine-grained PAT (Contents + Pull requests: read/write, this repo only) saved as
#      the REFRESH_PAT secret. Required for full automation: a PR created with the default
#      GITHUB_TOKEN cannot trigger the "checks" workflow, so the required check never
#      reports and auto-merge waits forever; a GITHUB_TOKEN merge also doesn't fire the
#      Deploy push. Without the secret everything still runs, but PRs wait for a human.

on:
  schedule:
    # Every 2 hours at :17 — off-the-hour (dodges cron congestion), frequent enough to
    # track a live programme during summit week. The gate job stops the schedule on
    # 2026-07-12.
    - cron: '17 */2 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  issues: write
  actions: write # gate job disables this workflow once the summit is over

concurrency:
  group: refresh
  cancel-in-progress: true

jobs:
  # The programme stops changing once the summit wraps (2026-07-10), so the schedule stops
  # on 2026-07-12: cron can't express an end date, so the first scheduled run on/after
  # that date disables the workflow instead of scraping (last scheduled scrape is 22:17
  # UTC on the 11th). Manual dispatch always runs, even past the date; bring the schedule
  # back with: gh workflow enable 'Refresh data'
  gate:
    runs-on: ubuntu-latest
    outputs:
      go: ${{ steps.check.outputs.go }}
    steps:
      - name: Retire schedule on 2026-07-12
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ "${{ github.event_name }}" = "schedule" ] && [ "$(date -u +%Y%m%d)" -ge 20260712 ]; then
            gh workflow disable 'Refresh data' --repo "${{ github.repository }}"
            echo "go=false" >> "$GITHUB_OUTPUT"
            echo "On/past 2026-07-12 — schedule retired; workflow disabled." >> "$GITHUB_STEP_SUMMARY"
          else
            echo "go=true" >> "$GITHUB_OUTPUT"
          fi

  refresh:
    needs: gate
    if: needs.gate.outputs.go == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - run: npm ci

      # Keep the committed baseline for the semantic diff.
      - name: Snapshot current data
        run: cp public/data/2026.json /tmp/old.2026.json

      # Scrape writes atomically and fails its sanity gates (0 events / floor / parse ratio)
      # WITHOUT writing — so a broken source can never overwrite the committed file.
      - name: Scrape
        run: npm run scrape

      # Semantic diff vs the baseline, ignoring the fetchedAt timestamp so an unchanged
      # programme does not churn a daily commit. Sets outputs: changed / large / removed_vocab.
      - name: Semantic diff
        id: diff
        run: npx tsx scripts/diff.ts public/data/2026.json /tmp/old.2026.json | tee /tmp/diff.md

      # No semantic change → discard the timestamp-only churn so nothing is committed.
      - name: Discard no-op churn
        if: steps.diff.outputs.changed != 'true'
        run: git checkout -- public/data

      - name: Open / update pull request
        id: cpr
        if: steps.diff.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.REFRESH_PAT || github.token }}
          branch: bot/data-refresh-2026
          base: main
          title: 'data: refresh 2026 snapshot'
          body-path: /tmp/diff.md
          labels: |
            data-refresh
            automated
          commit-message: 'data: refresh 2026 snapshot'
          add-paths: public/data

      # Auto-merge only small, structurally safe diffs. Degrades gracefully (continue-on-error)
      # if branch protection / auto-merge isn't configured.
      - name: Auto-merge safe diffs
        if: >-
          steps.diff.outputs.changed == 'true' &&
          steps.diff.outputs.large != 'true' &&
          steps.diff.outputs.removed_vocab != 'true' &&
          steps.cpr.outputs.pull-request-number
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.REFRESH_PAT || github.token }}
        run: gh pr merge --squash --auto "${{ steps.cpr.outputs.pull-request-number }}"

      # Canary: if any step above failed (e.g. the source structure changed → 0 events),
      # surface it in one rolling tracking issue rather than silent email-only failure.
      - name: Flag failure
        if: failure()
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          existing=$(gh issue list --state open --search "Programme refresh failed in:title" --json number --jq '.[0].number')
          if [ -z "$existing" ]; then
            gh issue create --title "Programme refresh failed" \
              --body "The scheduled scrape failed. The source structure may have changed, or the site was unreachable. Committed data was left untouched.\n\nRun: $RUN_URL"
          else
            gh issue comment "$existing" --body "Failed again. Run: $RUN_URL"
          fi
