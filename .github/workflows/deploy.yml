name: Deploy

# Build the static site and publish to GitHub Pages. Mirrors the structure of the owner's
# josiahwsmith10.github.io publish workflow (modern Pages deployment, no gh-pages branch).

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# One deployment at a time; don't cancel an in-progress publish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  # Quality gates — run on every push and PR (the whole point of the pipeline).
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm run lint
      - run: npm run format:check
      - run: npm test

  build:
    needs: checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci

      # Vite build. base '/ai4good-planner/' is set in vite.config.ts for production.
      # Committed public/data/*.json is copied into dist/ as a static asset.
      - run: npm run build

      # enablement: true lets the workflow turn Pages on itself (source = GitHub Actions),
      # so a fresh repo doesn't 404 waiting for the setting to be toggled by hand.
      - uses: actions/configure-pages@v5
        with:
          enablement: true
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
